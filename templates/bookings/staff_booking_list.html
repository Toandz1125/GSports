{% extends "base.html" %}

{% block title %}Quản lý booking hệ thống | GSports{% endblock %}

{% block content %}
  <section class="page-heading">
    <div>
      <p class="eyebrow">Nhân viên</p>
      <h1>Quản lý booking hệ thống</h1>
      <p class="muted">Toàn bộ booking của mọi khách hàng trên tất cả cơ sở và sân.</p>
    </div>
  </section>

  <form method="get" class="filter-bar">
    <div class="filter-field">
      <label for="filter-date">Ngày</label>
      <input type="date" id="filter-date" name="date" value="{{ request.GET.date }}">
    </div>
    <div class="filter-field">
      <label for="filter-venue">Cơ sở</label>
      <select id="filter-venue" name="venue">
        <option value="">Tất cả</option>
        {% for venue in venues %}
          <option value="{{ venue.pk }}" {% if applied_filters.venue == venue.pk %}selected{% endif %}>{{ venue.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-field">
      <label for="filter-field">Sân</label>
      <select id="filter-field" name="field">
        <option value="">Tất cả</option>
        {% for field in fields %}
          <option value="{{ field.pk }}" {% if applied_filters.field == field.pk %}selected{% endif %}>{{ field.venue.name }} — {{ field.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-field">
      <label for="filter-status">Trạng thái</label>
      <select id="filter-status" name="status">
        <option value="">Tất cả</option>
        {% for value, label in status_choices %}
          <option value="{{ value }}" {% if applied_filters.status == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-field">
      <label for="filter-customer">Khách hàng</label>
      <input type="text" id="filter-customer" name="customer" value="{{ request.GET.customer }}" placeholder="Email / tên / SĐT">
    </div>
    <div class="filter-actions">
      <button type="submit" class="btn btn-primary">Lọc</button>
      <a class="btn btn-outline" href="{% url 'bookings:staff_booking_list' %}">Xóa lọc</a>
    </div>
  </form>

  {% include "bookings/partials/_booking_management_table.html" %}
{% endblock %}
