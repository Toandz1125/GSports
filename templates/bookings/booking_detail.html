{% extends "base.html" %}

{% block title %}Chi tiết booking | GSports{% endblock %}

{% block content %}
  <section class="page-heading">
    <div>
      <p class="eyebrow">Chi tiết booking</p>
      <h1>{{ booking.field.name }}</h1>
      <p class="muted">{{ booking.booking_date }} · {{ booking.venue.name }}</p>
    </div>
    <a class="btn btn-outline" href="{{ back_url|default:'/bookings/' }}">Quay lại</a>
  </section>

  <div id="booking-detail" data-refresh-url="{{ request.get_full_path }}">
    {% include "bookings/partials/_booking_detail_content.html" %}
  </div>
{% endblock %}
